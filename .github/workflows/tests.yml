# Runs the browser-free pytest suite on every push/PR. The suite deliberately
# needs no real browser, cookies, or `claude` CLI (see "Testing strategy" in
# ARCHITECTURE.md), so it runs fine on a bare runner — no `playwright install`.
name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      # The tests only import the pure modules; byte-compiling everything also
      # catches syntax errors in the browser-bound runners and scrapers.
      - name: Byte-compile all sources
        run: python -m compileall -q .
      - name: Run the test suite
        run: python -m pytest
